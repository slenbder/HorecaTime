services:
  bot:
    build:
      context: .
    container_name: horecatime-bot
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - .env

    environment:
      - TZ=Europe/Moscow
      - PYTHONUNBUFFERED=1

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./credentials.json:/app/credentials.json:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('file:data/bot.db?mode=ro', uri=True).execute('SELECT 1 FROM employees LIMIT 1')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
