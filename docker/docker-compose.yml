version: '3.8'

services:
  horecatime-bot:
    image: slenbder/horecatime:latest
    container_name: horecatime-bot
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - TZ=Europe/Moscow
      - PYTHONUNBUFFERED=1

    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../credentials.json:/app/credentials.json:ro

    healthcheck:
      test: ["CMD", "pgrep", "-f", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
